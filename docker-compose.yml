services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: familylink
      POSTGRES_USER: familylink
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familylink"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://familylink:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db/familylink
    depends_on:
      db:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.http-0-cha67f8p0xtt7y1mv464yu43.entryPoints=http
      - traefik.http.routers.http-0-cha67f8p0xtt7y1mv464yu43.middlewares=gzip
      - traefik.http.routers.http-0-cha67f8p0xtt7y1mv464yu43.rule=Host(`pcw4cckcsoc4o8kog00s0kgg.192.168.0.22.sslip.io`) && PathPrefix(`/`)
      - traefik.http.routers.http-0-cha67f8p0xtt7y1mv464yu43.service=http-0-cha67f8p0xtt7y1mv464yu43
      - traefik.http.services.http-0-cha67f8p0xtt7y1mv464yu43.loadbalancer.server.port=8000

volumes:
  pgdata:
